name: Android CI

on:
  push:
    branches: [ 'main' ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
  
      - &setup-java
        name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - &write-api-key
        name: Access API_KEY
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: echo API_KEY=\"$API_KEY\" > ./apikey.properties

      - &setup-gradle
        name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
  
      - &grant-gradlew
        name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
  
      - name: Build with Gradle
        run: ./gradlew build

  screenshot-tests:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *setup-java
      - *write-api-key
      - *setup-gradle
      - *grant-gradlew

      - name: Run screenshot tests
        run: ./gradlew validateDebugScreenshotTest

      - name: Upload screenshot reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: screenshot-test-reports
          path: |
            app/build/reports/screenshotTest/
            app/build/test-results/validateDebugScreenshotTest/
            app/build/outputs/screenshotTest-results/
          if-no-files-found: ignore
          retention-days: 7
